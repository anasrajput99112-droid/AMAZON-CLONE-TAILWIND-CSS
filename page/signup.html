<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sign up</title>
    <link rel="stylesheet" href="/src/output.css" />
  </head>
  <body class="font-outfit bg-white text-center">
    <div class="flex justify-center items-center">
      <a href="/">
        <img
          class="w-[100px] mt-[25px]"
          src="/assets/amazon_logo_dark.png"
          alt=""
        />
      </a>
    </div>

    <div
      class="max-w-[350px] mx-auto mt-[25px] border border-[#d2d2d2] p-[20px] text-left rounded-[8px]"
    >
      <h1 class="text-[28px] font-[400]">Create Account</h1>
      <h5 class="text-[16px] font-[400]">Your name</h5>
      <input
        id="signupName"
        class="w-full p-[10px] mt-[10px] mb-[20px] border border-[#d2d2d2] rounded-[8px]"
        type="text"
        placeholder="First and last name"
      />
      <h5 class="text-[16px] font-[400]">Email</h5>
      <input
        id="signupEmail"
        class="w-full p-[10px] mt-[10px] mb-[20px] border border-[#d2d2d2] rounded-[8px]"
        type="email"
        placeholder="Type Email"
      />
      <h5 class="text-[16px] font-[400]">Mobile number</h5>
      <input
        id="signupMobile"
        class="w-full p-[10px] mt-[10px] mb-[20px] border border-[#d2d2d2] rounded-[8px]"
        type="text"
        placeholder="Mobile number"
      />
      <h5 class="text-[16px] font-[400]">Password</h5>
      <input
        id="signupPassword"
        class="w-full p-[10px] mt-[10px] mb-[20px] border border-[#d2d2d2] rounded-[8px]"
        type="password"
        placeholder="At least 6 characters"
      />
      <div id="signupError" class="text-red-500 text-[13px] mb-3 hidden"></div>
      <button
        id="signupBtn"
        class="w-full bg-[#f0c14b] hover:bg-[#e7a322] text-[16px] font-[400] py-[10px] rounded-[8px] border border-[#d2d2d2]"
      >
        Create your Amazon account
      </button>
      <p class="text-[14px] font-[400] mt-[10px]">
        By continuing, you agree to Amazon's
        <a href="#" class="text-blue-500 hover:underline">Conditions of Use</a>
        and
        <a href="#" class="text-blue-500 hover:underline">Privacy Notice</a>.
      </p>
      <a
        href="/page/signin.html"
        class="text-blue-500 hover:underline py-7 text-[14px]"
        >Already have an account?</a
      >
    </div>
    <script src="../js/main.js"></script>
  </body>
</html>
